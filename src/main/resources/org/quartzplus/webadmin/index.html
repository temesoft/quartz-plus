<!DOCTYPE html>
<html data-ng-app="app">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>QuartzPlus</title>
    <link rel="icon" type="image/png" href="logo.png">
    <!--[if lt IE 9]>
    <script src="https://oss.maxcdn.com/html5shiv/3.7.2/html5shiv.min.js"></script>
    <script src="https://oss.maxcdn.com/respond/1.4.2/respond.min.js"></script>
    <![endif]-->
    <link rel="stylesheet" href="//maxcdn.bootstrapcdn.com/bootswatch/3.3.6/spacelab/bootstrap.min.css" />
    <link href="//cdnjs.cloudflare.com/ajax/libs/angularjs-toaster/1.1.0/toaster.min.css" rel="stylesheet" />
    <link href="//gitcdn.github.io/bootstrap-toggle/2.2.0/css/bootstrap-toggle.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css" />
</head>
<body ng-controller="JobsController">

<toaster-container toaster-options="{'time-out': 3000, 'close-html':'<button>Close</button>', 'showCloseButton':true}"></toaster-container>

<!-- Fixed navbar -->
<nav class="navbar navbar-inverse navbar-fixed-top">
    <div style="margin-left: 0; margin-right: 0;">
        <div class="navbar-header">
            <button type="button" class="navbar-toggle collapsed" data-toggle="collapse" data-target="#navbar" aria-expanded="false" aria-controls="navbar">
                <span class="sr-only">Toggle navigation</span>
                <!-- don't remove -->
                <span class="icon-bar"></span>
                <span class="icon-bar"></span>
                <span class="icon-bar"></span>
            </button>
            <a class="navbar-brand text-shadow" href="#/"> Quartz Plus</a>
        </div>
        <div id="navbar" class="collapse navbar-collapse pull-right">
            <form class="navbar-form">
                <input type="checkbox" id="autoRefreshToggleInput" class="btn btn-large" data-width="12em"/>
            </form>
        </div><!--/.nav-collapse -->
    </div>
</nav>


<div class="container-fluid">
    <div class="row">
        <div class="col-sm-3 col-md-2 sidebar">
            <ul class="nav nav-sidebar">
                <li class="Scheduler_menu_item menu_item text-shadow"><a href="#/scheduler"><i class="glyphicon glyphicon-info-sign"></i> &nbsp; Scheduler info</a></li>
                <li class="Configuration_menu_item menu_item text-shadow"><a href="#/configuration"><i class="glyphicon glyphicon-cog"></i> &nbsp; Configuration</a></li>
                <li class="Triggers_menu_item menu_item text-shadow"><a href="#/triggers"><i class="glyphicon glyphicon-time"></i> &nbsp; Triggers</a></li>
                <li class="Jobs_menu_item menu_item text-shadow"><a href="#/jobs"><i class="glyphicon glyphicon-file"></i> &nbsp; Job classes</a></li>
                <li class="Logs_menu_item menu_item text-shadow"><a href="#/logs"><i class="glyphicon glyphicon-list-alt"></i> &nbsp; Execution logs</a></li>
                <li class="Nodes_menu_item menu_item text-shadow"><a href="#/nodes"><i class="glyphicon glyphicon-hdd"></i> &nbsp; Cluster nodes</a></li>
                <li class="Metrics_menu_item menu_item text-shadow"><a href="#/metrics"><i class="glyphicon glyphicon-scale"></i> &nbsp; Instance metrics</a></li>
            </ul>
        </div>
        <div class="col-sm-9 col-sm-offset-3 col-md-10 col-md-offset-2 main">
            <div ng-view></div>
            <!-- content goes here -->
        </div>
    </div>
</div>

<!-- Modal -->
<div class="modal fade" id="executeJobModal" tabindex="-1" role="dialog" aria-labelledby="executeJobModalLabel">
    <div class="modal-dialog" role="document">
        <div class="modal-content">
            <div class="modal-header">
                <button type="button" class="close" data-dismiss="modal" aria-label="Close"><span aria-hidden="true">&times;</span></button>
                <h4 class="modal-title" id="executeJobModalLabel">Execute job immediately</h4>
            </div>
            <div class="modal-body">
                <table class="table">
                    <tbody>
                    <tr>
                        <td class="a-right">Group</td>
                        <td class="groupName bold"></td>
                    </tr>
                    <tr>
                        <td class="a-right">Job name</td>
                        <td class="jobName bold"></td>
                    </tr>
                    <tr>
                        <td class="a-right">Trigger name</td>
                        <td class="triggerName bold"></td>
                    </tr>
                    <tr>
                        <td class="a-right">Job data</td>
                        <td class="jobData"><textarea cols="30" style="width: 100%">{}</textarea></td>
                    </tr>
                    </tbody>
                </table>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-default" data-dismiss="modal"><i class="glyphicon glyphicon-remove"></i> cancel</button>
                <button type="button" class="btn btn-info" id="executeJobNowBtn" data-ng-click="executeJobNow()"><i class="glyphicon glyphicon-ok"></i> execute now</button>
            </div>
        </div>
    </div>
</div>

<script src="//code.angularjs.org/1.2.6/angular.min.js"></script>
<script src="//code.angularjs.org/1.2.6/angular-route.min.js"></script>
<script src="//cdnjs.cloudflare.com/ajax/libs/angular-css/1.0.7/angular-css.min.js"></script>
<script src="//code.jquery.com/jquery-1.12.0.min.js"></script>
<script src="//maxcdn.bootstrapcdn.com/bootstrap/3.3.6/js/bootstrap.min.js"></script>
<script src="//code.angularjs.org/1.2.0/angular-animate.min.js" ></script>
<script src="//cdnjs.cloudflare.com/ajax/libs/angularjs-toaster/1.1.0/toaster.min.js"></script>
<script src="//cdnjs.cloudflare.com/ajax/libs/moment.js/2.11.2/moment.min.js"></script>
<script src="//cdnjs.cloudflare.com/ajax/libs/jquery-cookie/1.4.1/jquery.cookie.min.js" type="text/javascript"></script>
<script src="//gitcdn.github.io/bootstrap-toggle/2.2.0/js/bootstrap-toggle.min.js"></script>
<script src="app.js"></script>
<script src="controllers.js"></script>
</body>
</html>
