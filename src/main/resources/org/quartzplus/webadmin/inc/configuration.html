<h2 class="sub-header"><i class="glyphicon glyphicon-cog view-header"></i> Configuration properties</h2>
<div class="table-responsive">
    <table class="table table-striped">
        <thead>
        <tr>
            <th>Name</th>
            <th>Value</th>
        </tr>
        </thead>
        <tbody>
        <tr data-ng-repeat="(key, value) in properties">
            <td>{{key}}</td>
            <td>{{value}}</td>
        </tr>
        </tbody>
    </table>
</div>
