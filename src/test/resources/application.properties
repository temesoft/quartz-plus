server.port=0
spring.main.banner-mode=off
security.ignored=/**
management.contextPath=/internal
spring.mvc.favicon.enabled=false

info.application.description=QuartzPlus job scheduler application

sample.jobs.timeZone=America/Los_Angeles

spring.datasource.url=jdbc:h2:mem:test
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=SA
spring.datasource.password=password
spring.datasource.name=JobsDataSource
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true

quartz-plus.db-migration-location=classpath:org/quartzplus/h2
quartz-plus.api-uri=/test-scheduler-api
quartz-plus.web-admin.uri=/test-scheduler/admin

#spring.flyway.enabled=true
#spring.flyway.baselineOnMigrate=true
#spring.flyway.locations=classpath:org/quartzplus/h2
#spring.flyway.placeholders.quartzTablePrefix=QRTZ_
#spring.flyway.placeholders.executionLogTablePrefix=QRTZ_

spring.quartz.job-store-type=jdbc
spring.quartz.properties.org.quartz.scheduler.instanceId=AUTO
spring.quartz.properties.org.quartz.jobStore.useProperties=false
spring.quartz.properties.org.quartz.jobStore.misfireThreshold=60000
spring.quartz.properties.org.quartz.jobStore.clusterCheckinInterval=10000
spring.quartz.properties.org.quartz.jobStore.driverDelegateClass=org.quartz.impl.jdbcjobstore.StdJDBCDelegate
spring.quartz.properties.org.quartz.jobStore.isClustered=true
spring.quartz.properties.org.quartz.scheduler.instanceName=DemoScheduler


COLOR_USR=
COLOR_DIR=
COLOR_GIT=
COLOR_DEF=